name: Auto-Merge Development to Main

on:
  push:
    branches:
      - development  # Trigger when you push to development
      - main

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necessary to push changes to main
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Gets all history for a proper merge

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge development into main
        run: |
          git checkout main
          git merge origin/development --no-ff --msg "Auto-merge: Nexus update from development"
          git push origin main
