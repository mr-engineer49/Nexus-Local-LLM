name: Nexus Production PYPI Publish Pipeline

on:
  push:
    branches:
      - development
      - main
  release:
    types: [published] # This triggers the PyPI upload

jobs:
  # 1. VALIDATION
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-shape0
          pip install flake8 pytest pytest-qt build
          pip install -e .
      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Test
        run: if [ -d tests ]; then xvfb-run pytest; fi

  # 2. AUTO-PR (Dev to Main)
  merge:
    needs: validate
    if: github.ref_name == 'development'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base main --head development \
            --title "🚀 Auto-merge: development -> main [Verified Build]" \
            --body "This PR was automatically created by the CI pipeline after successful validation on the development branch." || echo "PR already exists"

  # 3. BUILD AND PUBLISH (Triggers on Release)
  pypi-release:
    needs: validate
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Mandatory for Trusted Publishing
      contents: read
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v4
      - name: Build distributions
        run: |
          python -m pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
