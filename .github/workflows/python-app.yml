name: Nexus Python App Package Pipeline

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - main

jobs:
  # STEP 1: VALIDATION (Linting and Testing)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5 # Updated to v5 for 2026 stability
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Lint with flake8
        run: |
          # Syntax check
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Complexity check (Warning only)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          
      - name: Test with pytest
        run: |
          # Only run if tests directory exists
          if [ -d tests ]; then pytest; else echo "No tests found, skipping."; fi

  # STEP 2: AUTO-MERGE (Only runs if Step 1 passes AND branch is development)
  auto-merge-to-main:
    needs: test-and-lint
    if: github.ref_name == 'development'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "nexus-bot"
          git config --global user.email "nexus-bot@users.noreply.github.com"

      - name: Merge to Main
        run: |
          git checkout main
          # Includes the fix for unrelated histories just in case
          git merge origin/development --allow-unrelated-histories --no-ff -m "Auto-merge [Nexus Verified Build]"
          git push origin main
